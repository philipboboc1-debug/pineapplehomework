<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Physics Lab</title> <link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png"> <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <script src="baremux/index.js" defer></script>

    <style>
        body { font-family: sans-serif; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        input { padding: 15px; width: 350px; border-radius: 30px; border: 1px solid #444; background: #222; color: white; outline: none; text-align: center; }
        button { margin-top: 20px; padding: 10px 25px; border-radius: 20px; border: none; background: #333; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Search</h1>
    <form id="proxy-form">
        <input id="proxy-address" type="text" placeholder="Enter URL or search..." required>
        <br><button type="submit">Go</button>
    </form>

    <script>
        // Connects to the Wisp server (The "Bridge")
        window.addEventListener('load', async () => {
            const connection = new BareMux.BareMuxConnection("/baremux/worker.js");
            // This is the fastest Wisp server for 2026
            await connection.setTransport("/epoxy/index.mjs", [{ wisp: "wss://wisp.mercurywork.shop/" }]);
        });

        document.getElementById('proxy-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('proxy-address').value;
            let url = input.trim();
            
            if (!url.startsWith('http')) {
                url = url.includes('.') && !url.includes(' ') ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url);
            }

            // Registers the Service Worker and Launches
            await navigator.serviceWorker.register('./uv/sw.js', { scope: __uv$config.prefix });
            window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
        });
    </script>
</body>
</html>
