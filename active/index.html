<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title>
    <link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">
    
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <script src="baremux/index.js" defer></script>

    <style>
        body { font-family: sans-serif; background: #111; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        input { padding: 15px; width: 400px; border-radius: 25px; border: none; outline: none; font-size: 16px; }
        button { padding: 10px 20px; margin-top: 15px; border-radius: 20px; border: none; cursor: pointer; background: #444; color: white; transition: 0.3s; }
        button:hover { background: #666; }
    </style>
</head>
<body>

    <h1>Search</h1>
    <form id="uv-form">
        <input id="uv-address" type="text" placeholder="Search Google or type a URL" required>
        <br>
        <center><button type="submit">Launch</button></center>
    </form>

    <script>
        const form = document.getElementById('uv-form');
        const address = document.getElementById('uv-address');

        // Setup Bare-Mux for Vercel Compatibility
        window.addEventListener('load', async () => {
            if ('serviceWorker' in navigator) {
                await navigator.serviceWorker.register('/uv/sw.js', { scope: '/uv/service/' });
            }
            
            const connection = new BareMux.BareMuxConnection("/baremux/worker.js");
            // Vercel doesn't support Wisp well, so we force a reliable Bare Transport
            if (!await connection.getTransport()) {
                await connection.setTransport("/baremod/index.mjs", [__uv$config.bare]);
            }
        });

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            
            let url = address.value.trim();
            if (!(url.startsWith('https://') || url.startsWith('http://'))) {
                if (url.includes('.') && !url.includes(' ')) {
                    url = 'https://' + url;
                } else {
                    url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                }
            }

            // Redirect to the proxied URL
            window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
        });
    </script>
</body>
</html>
