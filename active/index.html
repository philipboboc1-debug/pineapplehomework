<!DOCTYPE html>
<html>
<head>
    <title>Google Classroom</title>
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <script src="baremux/index.js" defer></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        input { padding: 12px; width: 300px; border-radius: 20px; border: none; }
        button { padding: 10px 20px; margin-top: 10px; cursor: pointer; border-radius: 20px; border: none; background: #444; color: white; }
    </style>
</head>
<body>
    <h1>Search</h1>
    <input id="url" type="text" placeholder="Enter URL or Search...">
    <button id="btn">Go</button>

    <script>
        const btn = document.getElementById('btn');
        const input = document.getElementById('url');

        // FORCE REGISTER THE WORKER ON LOAD
        window.addEventListener('load', async () => {
            try {
                await navigator.serviceWorker.register('./uv/sw.js', { scope: '/uv/service/' });
                const connection = new BareMux.BareMuxConnection("/baremux/worker.js");
                await connection.setTransport("/epoxy/index.mjs", [{ wisp: "wss://wisp.mercurywork.shop/" }]);
                console.log("Ready to go.");
            } catch (e) {
                console.error("Worker failed:", e);
            }
        });

        // THE "GO" LOGIC
        btn.onclick = async () => {
            let url = input.value.trim();
            if (!url.startsWith('http')) {
                url = url.includes('.') && !url.includes(' ') ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url);
            }
            
            // This is the direct launch command
            window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
        };
    </script>
</body>
</html>
