<!DOCTYPE html>
<html>
  <script src="baremux/index.js"></script>
<script>
  window.addEventListener('load', async () => {
    const connection = new BareMux.BareMuxConnection("/baremux/worker.js");
    // Wisp is the fastest/lightest way to connect in 2026
    await connection.setTransport("/epoxy/index.mjs", [{ wisp: "wss://wisp.mercurywork.shop/" }]);
  });
</script>
<head>
  <title>Redirect Page</title>
  <script>
    window.onload = function() {
      window.location.href = "active/"; // Replace with your desired URL
    };
  </script>
</head>
<body>
  <h1>Redirecting...</h1>
  <p>If you are not redirected, <a href="active/">click here</a>.</p>
</body>
</html>
